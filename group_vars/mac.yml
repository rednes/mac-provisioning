# The variables file used by the playbooks in the mac group.

ansible_python_interpreter: /opt/homebrew/bin/python3

homebrew_taps:
  - tap: weaveworks/tap
  - tap: kyoshidajp/ghkw
  - tap: sachaos/todoist
  - tap: goodwithtech/r
  - tap: classmethod/repos

homebrew_packages:
  - name: act
  - { name: ansible, state: present }
  - name: aws-iam-authenticator
  - name: awscurl
  - name: cfn-lint
  - name: colordiff
  - name: direnv
  - name: editorconfig
  - name: findutils
  - name: fish
  - name: ffmpeg
  - name: gh
  - name: ghkw
  - name: git
  - name: git-remote-codecommit
  - name: git-secrets
  - name: gnuplot
  - name: go
  - name: gradle
  - name: helm
  - name: iproute2mac
  - name: jq
  - { name: jsonlint, state: absent, install_options: force }
  - name: kubectl
  - name: kubectx
  - name: less
  - name: maven
  - name: mecab
  - name: minikube
  - name: mkcert
  - name: mysql
  - name: nmap
  - name: node@24
  - name: openssl
  - { name: pipenv, state: absent, install_options: force }
  - name: plantuml
  - name: pipx
  - name: pkg-config
  - { name: pyenv, state: absent, install_options: force }
  - name: python
  - name: rain
  - name: rbenv
  - name: redis
  - name: ruby-build
  - name: rulesync
  - name: screen
  - name: tfenv
  - name: tig
  - name: tmux
  - name: travis
  - name: tree
  - name: watch
  - name: wget
  - name: zoxide
  - name: zsh
  # sachaos/todoist
  - name: sachaos/todoist/todoist
  # goodwithtech/r
  - name: goodwithtech/r/dockle
  # classmethod/repos
  - name: classmethod/repos/aurl

homebrew_cask_packages:
  - name: appcleaner
  - name: aws-vault
  - name: camo-studio
  - { name: dbeaver-community, state: upgraded }
  - name: deepl
  - name: discord
  - { name: disk-inventory-x, state: upgraded }
  - name: drawio
  - name: figma
  - name: firefox
  - name: google-chrome
  - { name: google-japanese-ime, state: upgraded }
  - { name: iterm2, state: upgraded }
  - name: jetbrains-toolbox
  - { name: keepassxc, state: upgraded }
  - { name: libreoffice, state: upgraded }
  - { name: miro, state: upgraded }
  - { name: ngrok, state: upgraded }
  - { name: notion, state: upgraded }
  - { name: onedrive, state: upgraded }
  - name: postman
  - name: postman-agent
  - { name: qr-journal, state: upgraded }
  - name: rancher
  - name: slack
  - name: thunderbird
  - name: todoist
  - name: windows-app

npm_packages:
  - name: "@aws-amplify/cli"
  - name: "@angular/cli@v8-lts"
  - name: auth0-deploy-cli
  - { name: aws-cdk, state: absent }
  - { name: aws-sam-local, state: absent }
  - { name: cfn-lint, state: absent }
  - name: eslint
  - name: fastify-cli
  - name: jsonlint
  - name: npm
  - name: npm-check-updates
  - name: swagger
  - name: textlint
  - name: textlint-rule-max-ten
  - name: textlint-rule-no-mix-dearu-desumasu
  - name: textlint-rule-spellcheck-tech-word
  - { name: typescript, state: absent }
  - { name: webpack, state: absent }
  - { name: webpack-cli, state: absent }
  - name: wscat
  - name: yarn

pipx_packages: 
  - name: awsume
